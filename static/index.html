<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Détection d’actions anormales</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --alert: #f59e0b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid #2a3545;
      background: linear-gradient(180deg, #151c28, var(--bg));
    }
    h1 { font-size: 1.35rem; font-weight: 600; margin: 0 0 0.35rem; }
    p.sub { margin: 0; color: var(--muted); font-size: 0.95rem; }
    main { max-width: 960px; margin: 0 auto; padding: 2rem; }
    .card {
      background: var(--panel);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border: 1px solid #2a3545;
    }
    label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--muted); }
    input[type="file"] {
      width: 100%;
      padding: 0.75rem;
      background: #0d1218;
      border: 1px dashed #3d4f66;
      border-radius: 8px;
      color: var(--text);
    }
    .row { display: flex; gap: 1rem; flex-wrap: wrap; align-items: flex-end; margin-top: 1rem; }
    .field { flex: 1; min-width: 120px; }
    input[type="number"] {
      width: 100%;
      padding: 0.5rem 0.75rem;
      background: #0d1218;
      border: 1px solid #3d4f66;
      border-radius: 8px;
      color: var(--text);
    }
    button {
      padding: 0.65rem 1.25rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .chart-wrap { overflow-x: auto; margin-top: 1rem; }
    canvas { max-width: 100%; height: 220px !important; }
    .meta { font-size: 0.85rem; color: var(--muted); margin-top: 0.75rem; }
    .error { color: #f87171; margin-top: 0.75rem; }
    footer { padding: 1rem 2rem; color: var(--muted); font-size: 0.8rem; text-align: center; }
  </style>
</head>
<body>
  <header>
    <h1>Détection d’actions anormales dans la vidéo</h1>
    <p class="sub">Descripteurs C3D (Sports-1M) et score de cohérence temporelle — pic = segment plus atypique.</p>
  </header>
  <main>
    <div class="card">
      <label for="video">Vidéo (mp4, avi, mov, mkv, webm)</label>
      <input type="file" id="video" accept="video/*" />
      <div class="row">
        <div class="field">
          <label for="window">Fenêtre (frames)</label>
          <input type="number" id="window" value="16" min="8" max="32" />
        </div>
        <div class="field">
          <label for="stride">Pas</label>
          <input type="number" id="stride" value="8" min="1" max="32" />
        </div>
        <button type="button" id="run">Analyser</button>
      </div>
      <p class="error" id="err" hidden></p>
      <p class="meta" id="meta"></p>
    </div>
    <div class="card" id="resultCard" hidden>
      <strong>Scores par fenêtre</strong>
      <div class="chart-wrap"><canvas id="chart"></canvas></div>
    </div>
  </main>
  <footer>C3D + analyse non supervisée — pour un classifieur entraîné (ODAS), ajoutez vos poids et adaptez le pipeline.</footer>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    let chart;

    $("run").addEventListener("click", async () => {
      const f = $("video").files[0];
      $("err").hidden = true;
      $("meta").textContent = "";
      if (!f) {
        $("err").textContent = "Choisissez un fichier vidéo.";
        $("err").hidden = false;
        return;
      }
      const fd = new FormData();
      fd.append("file", f);
      fd.append("window", $("window").value);
      fd.append("stride", $("stride").value);
      $("run").disabled = true;
      $("run").textContent = "Analyse…";
      try {
        const res = await fetch("/api/analyze", { method: "POST", body: fd });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || res.statusText);
        const w = data.windows || [];
        const m = data.meta || {};
        $("meta").textContent =
          `${m.num_frames || 0} frames · ${(m.fps || 0).toFixed(2)} fps · ${m.num_windows || 0} fenêtres`;
        $("resultCard").hidden = false;
        const labels = w.map((_, i) => "w" + (i + 1));
        const scores = w.map((x) => x.anomaly_score_norm ?? x.anomaly_score);
        const ctx = $("chart").getContext("2d");
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
          type: "bar",
          data: {
            labels,
            datasets: [{
              label: "Score (normalisé)",
              data: scores,
              backgroundColor: "rgba(61, 139, 253, 0.6)",
              borderColor: "rgba(61, 139, 253, 1)",
              borderWidth: 1
            }]
          },
          options: {
            responsive: true,
            scales: {
              y: { beginAtZero: true, max: 1.02, grid: { color: "#2a3545" } },
              x: { grid: { display: false }, ticks: { maxRotation: 0, autoSkip: true, maxTicksLimit: 24 } }
            },
            plugins: { legend: { labels: { color: "#e7ecf3" } } }
          }
        });
      } catch (e) {
        $("err").textContent = e.message || String(e);
        $("err").hidden = false;
      } finally {
        $("run").disabled = false;
        $("run").textContent = "Analyser";
      }
    });
  </script>
</body>
</html>
